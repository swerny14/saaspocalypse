<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ransom hero — preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #f4f1e8; font-family: system-ui, sans-serif; color: #0a0a0a; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 64px 48px; }
  label { display: block; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #666; margin-bottom: 8px; }
  input {
    width: 100%; padding: 12px 16px; font-size: 18px;
    border: 2.5px solid #0a0a0a; background: #fff;
    box-shadow: 4px 4px 0 0 #0a0a0a;
    font-family: inherit;
  }
  input:focus { outline: none; }
  .preview { margin-top: 56px; }
  .hero-ransom {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(48px, 7.5vw, 104px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.18em 0.25em;
  }
  .hero-ransom .chip {
    border: 2.5px solid #0a0a0a;
    box-shadow: 5px 5px 0 0 #0a0a0a;
    padding: 0.02em 0.14em;
    display: inline-block;
    transform-origin: center;
  }
  .hero-ransom .c0 { background: #ffffff; color: #0a0a0a; transform: rotate(-2deg); }
  .hero-ransom .c1 { background: #c6ff00; color: #0a0a0a; transform: rotate(1.5deg); }
  .hero-ransom .c2 { background: #ffd84d; color: #0a0a0a; transform: rotate(-1deg); }
  .hero-ransom .c3 { background: #0a0a0a; color: #c6ff00; transform: rotate(2.2deg); }
</style>
</head>
<body>
  <div class="wrap">
    <label>try your own headline</label>
    <input id="text" value="Can I build this myself?" />
    <div class="preview"><h1 class="hero-ransom" id="out"></h1></div>
  </div>
<script>
  const input = document.getElementById('text');
  const out = document.getElementById('out');
  function render() {
    out.innerHTML = '';
    input.value.split(/\s+/).filter(Boolean).forEach((w, i) => {
      const s = document.createElement('span');
      s.className = 'chip c' + (i % 4);
      s.textContent = w;
      out.appendChild(s);
    });
  }
  input.addEventListener('input', render);
  render();
</script>
</body>
</html>
