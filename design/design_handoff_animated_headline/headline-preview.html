<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Animated editorial headline — preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Fraunces:ital,opsz,wght@1,9..144,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f4f1e8;
    --accent: #c6ff00;
    --muted: #3a3a3a;
  }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 48px;
  }

  /* The headline element — drop-in component */
  .editorial-headline {
    width: 100%;
    max-width: 1100px;
    text-align: center;
    display: grid;
    justify-items: center;
    gap: 0.2em;
  }
  .editorial-headline .eh-h1 {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: clamp(62px, 9vw, 140px);
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.04em;
    margin: 0;
    text-wrap: balance;
    color: var(--ink);
    animation: eh-rise 720ms cubic-bezier(.2,.7,.2,1) both;
  }
  .editorial-headline .eh-h2 {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: clamp(34px, 4.4vw, 60px);
    font-weight: 500;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0.25em 0 0;
    text-wrap: balance;
    color: var(--muted);
    max-width: 20ch;
    animation: eh-rise 720ms cubic-bezier(.2,.7,.2,1) 180ms both;
  }
  .editorial-headline .eh-punch {
    position: relative;
    display: inline-block;
    white-space: nowrap;
  }
  .editorial-headline .eh-punch-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .editorial-headline .eh-mark {
    position: absolute;
    left: -3%;
    right: -3%;
    bottom: -0.18em;
    width: 106%;
    height: 0.34em;
    overflow: visible;
    pointer-events: none;
  }
  .editorial-headline .eh-mark-path {
    fill: none;
    stroke: var(--accent);
    stroke-width: 9;
    stroke-linecap: round;
    stroke-dasharray: 320;
    stroke-dashoffset: 320;
    animation: eh-mark-draw 760ms cubic-bezier(.55,.05,.25,1) 700ms forwards;
  }
  @keyframes eh-rise {
    from { opacity: 0; transform: translateY(0.18em); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes eh-mark-draw {
    from { stroke-dashoffset: 320; }
    to   { stroke-dashoffset: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .editorial-headline .eh-h1,
    .editorial-headline .eh-h2,
    .editorial-headline .eh-mark-path {
      animation: none;
    }
    .editorial-headline .eh-mark-path { stroke-dashoffset: 0; }
  }

  /* Replay button — preview-only, not part of the component */
  .replay {
    position: fixed; bottom: 20px; right: 20px;
    background: #fff; border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 0 var(--ink);
    padding: 8px 14px; font: 600 13px 'Space Grotesk', sans-serif;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="editorial-headline" id="headline">
    <h1 class="eh-h1">Scan any SaaS.</h1>
    <h2 class="eh-h2">
      Find the
      <span class="eh-punch">
        <span class="eh-punch-text">weak spot</span>
        <svg class="eh-mark" viewBox="0 0 320 28" preserveAspectRatio="none" aria-hidden="true">
          <path class="eh-mark-path" d="M6 18 C 60 6, 130 24, 200 12 S 290 16, 314 10" />
        </svg>
      </span>.
    </h2>
  </div>

  <button class="replay" onclick="
    const n = document.getElementById('headline');
    const c = n.cloneNode(true);
    n.replaceWith(c); c.id='headline';
  ">↻ replay animation</button>
</body>
</html>
