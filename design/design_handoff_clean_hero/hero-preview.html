<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Saaspocalypse — Clean hero preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f4f1e8;
    --accent: #c6ff00;
    --muted: #3a3a3a;
    --muted-2: #444;
  }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body { font-family: 'Space Grotesk', system-ui, sans-serif; }
  * { box-sizing: border-box; }

  /* NAV */
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 48px;
    border-bottom: 2.5px solid var(--ink);
    background: var(--paper);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-left { display: flex; align-items: center; gap: 12px; }
  .nav-mark {
    width: 34px; height: 34px;
    background: var(--accent);
    border: 2.5px solid var(--ink);
    display: grid; place-items: center;
    font-weight: 700; font-size: 20px;
    transform: rotate(-3deg);
  }
  .nav-name { font-weight: 700; font-size: 22px; letter-spacing: -0.02em; }
  .nav-tag {
    font-size: 11px; background: var(--ink); color: var(--accent);
    padding: 2px 8px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    user-select: none;
  }
  .nav-right { display: flex; gap: 24px; align-items: center; font-size: 14px; }
  .nav-right a { color: var(--ink); text-decoration: none; cursor: pointer; }
  .nav-cta {
    background: var(--accent);
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 0 var(--ink);
    padding: 8px 16px;
    font-family: inherit; font-weight: 600; font-size: 14px;
    cursor: pointer;
  }

  /* HERO */
  .hero { padding: 80px 48px 60px; position: relative; overflow: hidden; }
  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    gap: 28px;
    justify-items: center;
    text-align: center;
  }

  /* Eyebrow — pill + dot */
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 7px 14px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    background: #fff;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.05em;
  }
  .eyebrow-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 999px;
    border: 1.5px solid var(--ink);
  }

  /* Headline — Editorial */
  .headline {
    font-size: clamp(62px, 9vw, 140px);
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.04em;
    margin: 0;
    text-wrap: balance;
    color: var(--ink);
  }
  .subhead {
    font-size: clamp(34px, 4.4vw, 60px);
    font-weight: 500;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0.25em 0 0;
    text-wrap: balance;
    color: var(--muted);
    max-width: 20ch;
  }
  .subhead-mark {
    color: var(--ink);
    background-image: linear-gradient(var(--accent), var(--accent));
    background-repeat: no-repeat;
    background-size: 100% 0.22em;
    background-position: 0 88%;
    padding-bottom: 0.04em;
  }

  /* SCANNER (unchanged from the live page) */
  .scanner-wrap { margin: 48px auto 0; max-width: 780px; }
  .input-bar {
    background: #fff;
    border: 2.5px solid var(--ink);
    box-shadow: 6px 6px 0 0 var(--ink);
    display: flex; align-items: stretch;
  }
  .input-bar .scheme {
    padding: 18px 18px 18px 20px;
    border-right: 2.5px solid var(--ink);
    font-size: 16px; color: #666;
    display: flex; align-items: center;
  }
  .input-bar input {
    flex: 1; border: none;
    padding: 18px 20px;
    font-family: inherit; font-size: 20px;
    background: transparent; min-width: 0;
    outline: none;
  }
  .input-bar button {
    background: var(--accent);
    border: none; border-left: 2.5px solid var(--ink);
    padding: 0 28px;
    font-family: inherit; font-weight: 700; font-size: 18px;
    cursor: pointer; letter-spacing: -0.01em;
  }
  .presets {
    margin-top: 12px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    font-size: 13px;
    justify-content: center;
  }
  .presets .label { opacity: 0.6; }
  .presets button {
    background: #fff;
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 0 var(--ink);
    padding: 4px 10px;
    font-family: inherit; font-size: 12px;
    cursor: pointer;
  }
  .footnote {
    margin: 14px auto 0;
    max-width: 780px;
    font-size: 12px;
    opacity: 0.65;
    display: flex; gap: 20px; flex-wrap: wrap;
    justify-content: center;
    user-select: none;
  }
</style>
</head>
<body>
  <header class="nav">
    <div class="nav-left">
      <div class="nav-mark">§</div>
      <span class="nav-name">saaspocalypse</span>
      <span class="nav-tag">beta, probably</span>
    </div>
    <nav class="nav-right">
      <a>Examples</a>
      <a>How it works</a>
      <a>FAQ</a>
      <button class="nav-cta">Scan a URL ↓</button>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <!-- EYEBROW: Pill + dot -->
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        A free SaaS teardown tool
      </div>

      <!-- HEADLINE: Editorial (centered) -->
      <h1 class="headline">Scan any SaaS.</h1>
      <h2 class="subhead">Find the <span class="subhead-mark">weak spot</span>.</h2>
    </div>

    <!-- SCANNER (unchanged) -->
    <div class="scanner-wrap">
      <div class="input-bar">
        <div class="scheme">https://</div>
        <input type="text" placeholder="your-next-victim.com" value="notion-ish.com" />
        <button>judge it →</button>
      </div>
      <div class="presets">
        <span class="label">or try:</span>
        <button>notion-ish.com</button>
        <button>calendly-ish.com</button>
        <button>linear-ish.app</button>
        <button>stripe-ish.com</button>
      </div>
    </div>

    <div class="footnote">
      <span>✦ no signup</span>
      <span>✦ no credit card</span>
      <span>✦ we don't have a database (yet)</span>
      <span>✦ press ↵ to judge</span>
    </div>
  </section>
</body>
</html>
