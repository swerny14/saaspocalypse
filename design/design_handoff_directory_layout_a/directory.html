<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Saaspocalypse — directory mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #e8e6dc; font-family: "Space Grotesk", system-ui, sans-serif; }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  .blink { animation: blink 1s step-end infinite; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="directory-layouts.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <DesignCanvas
          title="Saaspocalypse — Directory mockups"
          subtitle="Two layouts for the scan directory. Same brutalist tokens (cream paper, 2.5px ink, hard shadows, mono labels) as the rest of the site."
        >
          <DCSection
            id="dir-a"
            title="Directory — Layout A · Filing cabinet"
            subtitle="Sidebar filters + 2-up card grid. Big search bar, score range slider, category chips, checkbox facets."
          >
            <DCArtboard id="dir-a-board" label="Directory · Layout A" width={1344} height={1900}>
              <DirectoryA />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="dir-b"
            title="Directory — Layout B · Stock ticker"
            subtitle="Sortable table with sticky filter chip rail and a live stat block. Denser, scannable, all 18 scans visible."
          >
            <DCArtboard id="dir-b-board" label="Directory · Layout B" width={1164} height={2000}>
              <DirectoryB />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
