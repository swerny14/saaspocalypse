<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Saaspocalypse — Neo-brutalist reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f1e8; }
  body { font-family: 'Space Grotesk', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes mq { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: mq 28s linear infinite; display: inline-flex; white-space: nowrap; }
  @keyframes dot { 0%,20% { opacity: 0; } 50% { opacity: 1; } 80%,100% { opacity: 0; } }
  .dot1 { animation: dot 1.2s infinite; animation-delay: 0s; }
  .dot2 { animation: dot 1.2s infinite; animation-delay: .2s; }
  .dot3 { animation: dot 1.2s infinite; animation-delay: .4s; }
  @keyframes wob { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }
  .wob { animation: wob 4s ease-in-out infinite; display: inline-block; }
  .bru { box-shadow: 6px 6px 0 0 #0a0a0a; border: 2.5px solid #0a0a0a; }
  .bru-sm { box-shadow: 4px 4px 0 0 #0a0a0a; border: 2px solid #0a0a0a; }
  .bru-xs { box-shadow: 3px 3px 0 0 #0a0a0a; border: 2px solid #0a0a0a; }
  input:focus, button:focus { outline: none; }
  .nosel { user-select: none; }
</style>
</head>
<body>
  <div id="root"></div>
<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{"accentA":"#c6ff00","accentB":"#ff3366","accentC":"#d97757","fontPairing":"grotesk-mono","toneDial":65,"mascotOn":false,"headlineVariant":0}/*EDITMODE-END*/
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="direction-brutalist.jsx"></script>
<script type="text/babel">
  const DEFAULTS = JSON.parse(document.getElementById('tweak-defaults').textContent.match(/\{[\s\S]*\}/)[0]);
  ReactDOM.createRoot(document.getElementById('root')).render(<BrutalistDirection tweaks={DEFAULTS} />);
</script>
</body>
</html>
