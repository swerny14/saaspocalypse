<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Saaspocalypse — blog mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #e8e6dc; font-family: "Space Grotesk", system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="blog-data.jsx"></script>
  <script type="text/babel" src="blog-layouts.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <DesignCanvas
          title="Saaspocalypse — Blog mockups"
          subtitle="Two layout variations for the index, plus a sample article. Same brutalist tokens as the rest of the site."
        >
          <DCSection id="index-a" title="Index — Layout A · Editorial broadsheet" subtitle="Featured serif headline + 3-up card grid. Uses Fraunces for headlines.">
            <DCArtboard id="index-a-board" label="Blog index · Layout A" width={1264} height={1900}>
              <BlogIndexA />
            </DCArtboard>
          </DCSection>

          <DCSection id="index-b" title="Index — Layout B · Newsroom list" subtitle="Single-column chronological list, all sans, dense and scannable.">
            <DCArtboard id="index-b-board" label="Blog index · Layout B" width={984} height={2400}>
              <BlogIndexB />
            </DCArtboard>
          </DCSection>

          <DCSection id="article" title="Sample article" subtitle="Single-post detail page. Serif body headings, lime callout block, end matter + newsletter.">
            <DCArtboard id="article-board" label="Article · 'Just one more feature'" width={844} height={2200}>
              <BlogArticle />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
